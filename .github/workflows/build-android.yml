name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NDK_VERSION: 28.0.13004108

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Cache Gradle wrapper and caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper/dists
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('yarn.lock', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Expo prebuild (Android)
        run: yarn expo prebuild --platform android --no-install

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Read app version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            -PreactNativeArchitectures=arm64-v8a,x86_64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
